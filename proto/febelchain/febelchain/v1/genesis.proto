syntax = "proto3";
package febelchain.febelchain.v1;

import "amino/amino.proto";
import "febelchain/febelchain/v1/params.proto";
import "gogoproto/gogo.proto";

option go_package = "febelchain/x/febelchain/types";

// GenesisState defines the febelchain module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
