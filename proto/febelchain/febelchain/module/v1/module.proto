syntax = "proto3";
package febelchain.febelchain.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "febelchain/x/febelchain/types";

// Module is the config object for the module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "febelchain/x/febelchain"};

  // authority defines the custom module authority.
  // If not set, defaults to the governance module.
  string authority = 1;
}
